<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1290px;
    height: 2796px;
    overflow: hidden;
    background: #0A0A0A;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }
  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 180px;
    position: relative;
  }
  .glow {
    position: absolute;
    top: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 1100px;
    height: 1100px;
    background: radial-gradient(circle, rgba(232, 93, 117, 0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .caption {
    color: #FFFFFF;
    font-size: 96px;
    font-weight: 700;
    text-align: center;
    line-height: 1.05;
    margin-bottom: 20px;
    z-index: 2;
    letter-spacing: -2px;
    padding: 0 80px;
  }
  .accent {
    color: #E85D75;
  }
  .subcaption {
    color: #A0A0A0;
    font-size: 42px;
    font-weight: 400;
    text-align: center;
    margin-bottom: 100px;
    z-index: 2;
  }
  .phone-frame {
    width: 900px;
    height: 1830px;
    background: #1A1A1A;
    border-radius: 80px;
    padding: 18px;
    box-shadow: 0 40px 140px rgba(232, 93, 117, 0.18), 0 0 0 3px rgba(255, 255, 255, 0.08);
    z-index: 2;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 64px;
    overflow: hidden;
    background: #0A0A0A;
  }
  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="glow"></div>
    <div class="caption">Find your<br><span class="accent">people</span></div>
    <div class="subcaption">Smart matching, real connections.</div>
    <div class="phone-frame">
      <div class="phone-screen">
        <img src="screen_feed.png" />
      </div>
    </div>
  </div>
</body>
</html>
