<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0A0A0A;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }
  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 120px;
    position: relative;
  }
  .glow {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(232, 93, 117, 0.18) 0%, transparent 60%);
    pointer-events: none;
  }
  .caption {
    color: #FFFFFF;
    font-size: 72px;
    font-weight: 700;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 12px;
    z-index: 2;
    letter-spacing: -1.5px;
    padding: 0 60px;
  }
  .accent {
    color: #E85D75;
  }
  .subcaption {
    color: #A0A0A0;
    font-size: 32px;
    font-weight: 400;
    text-align: center;
    margin-bottom: 80px;
    z-index: 2;
  }
  .phone-frame {
    width: 700px;
    height: 1380px;
    background: #1A1A1A;
    border-radius: 60px;
    padding: 14px;
    box-shadow: 0 30px 100px rgba(232, 93, 117, 0.15), 0 0 0 2px rgba(255, 255, 255, 0.08);
    z-index: 2;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 48px;
    overflow: hidden;
    background: #0A0A0A;
  }
  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="glow"></div>
    <div class="caption">Privacy<br><span class="accent">you control</span></div>
    <div class="subcaption">End-to-end encrypted. Always.</div>
    <div class="phone-frame">
      <div class="phone-screen">
        <img src="screen_settings.png" />
      </div>
    </div>
  </div>
</body>
</html>
