<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 500px; overflow: hidden; }
  body {
    background: #0A0A0A;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    color: #FFFFFF;
    display: flex;
    align-items: center;
    padding: 0 80px;
    position: relative;
  }
  .content {
    flex: 1;
    z-index: 2;
  }
  .logo {
    font-size: 140px;
    font-weight: 600;
    color: #E85D75;
    letter-spacing: -4px;
    line-height: 1;
    margin-bottom: 20px;
  }
  .tagline {
    font-size: 32px;
    font-weight: 400;
    color: #FFFFFF;
    line-height: 1.3;
    margin-bottom: 28px;
    max-width: 540px;
  }
  .badges {
    display: flex;
    gap: 16px;
  }
  .badge {
    font-size: 14px;
    font-weight: 700;
    color: #A0A0A0;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 16px;
    border: 1px solid #2A2A2A;
    border-radius: 999px;
  }
  .glow {
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232, 93, 117, 0.25) 0%, transparent 70%);
    pointer-events: none;
  }
  .heart {
    position: absolute;
    right: 120px;
    top: 50%;
    transform: translateY(-50%);
    width: 240px;
    height: 240px;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="logo">feels</div>
    <div class="tagline">the dating app that puts<br>real connections first</div>
    <div class="badges">
      <div class="badge">No Games</div>
      <div class="badge">No Bots</div>
      <div class="badge">Just Real</div>
    </div>
  </div>
  <svg class="heart" viewBox="0 0 24 24" fill="none">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#E85D75" fill-opacity="0.15" stroke="#E85D75" stroke-width="0.8"/>
  </svg>
</body>
</html>
