name: feels
description: The dating app that puts real connections first.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP
  dio: ^5.7.0

  # Local storage
  flutter_secure_storage: ^9.2.4

  # Images
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Auth
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # Payments
  purchases_flutter: ^8.9.1

  # Push notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4

  # Error tracking
  sentry_flutter: ^8.13.0

  # Utils
  http_parser: ^4.0.2
  intl: ^0.19.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  device_info_plus: ^11.3.3
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  equatable: ^2.0.7
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.2
  freezed: ^2.5.2
  riverpod_generator: ^2.6.2
  mockito: ^5.4.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
