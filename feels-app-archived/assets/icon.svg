<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neon glow filter -->
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="24" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Outer glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#e85d75" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="#000000"/>

  <!-- Feels text with neon effect -->
  <text
    x="512"
    y="560"
    text-anchor="middle"
    font-family="Brush Script MT, Segoe Script, Bradley Hand, cursive"
    font-size="280"
    font-weight="400"
    fill="#e85d75"
    filter="url(#glow)"
    style="font-style: italic;"
  >Feels</text>

  <!-- Brighter inner text for neon tube effect -->
  <text
    x="512"
    y="560"
    text-anchor="middle"
    font-family="Brush Script MT, Segoe Script, Bradley Hand, cursive"
    font-size="280"
    font-weight="400"
    fill="#ff8fa3"
    style="font-style: italic;"
  >Feels</text>
</svg>
